<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Ký Nhiều Bước</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .form-container { background: white; padding: 30px; border-radius: 8px; width: 450px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* Progress Bar */
        .progress-container { margin-bottom: 30px; text-align: center; }
        .progress-bar { display: flex; justify-content: space-between; position: relative; margin-bottom: 10px; }
        .step-circle { width: 30px; height: 30px; background: #ddd; border-radius: 50%; line-height: 30px; font-weight: bold; z-index: 1; }
        .step-circle.active { background: #1a73e8; color: white; }
        .progress-line { position: absolute; top: 15px; left: 0; height: 2px; background: #ddd; width: 100%; z-index: 0; }
        .progress-line-fill { position: absolute; top: 15px; left: 0; height: 2px; background: #1a73e8; width: 0%; transition: 0.3s; }

        /* Form Steps */
        .step { display: none; }
        .step.active { display: block; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .error { color: #ff4d4d; font-size: 12px; display: none; margin-top: 5px; }
        
        .btn-group { display: flex; justify-content: space-between; margin-top: 20px; }
        button { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-next { background: #1a73e8; color: white; }
        .btn-prev { background: #6c757d; color: white; }
        button:disabled { background: #ccc; cursor: not-allowed; }

        /* Step 3: Summary */
        .summary-box { background: #f8f9fa; padding: 15px; border-radius: 4px; border-left: 4px solid #1a73e8; }
    </style>
</head>
<body>

<div class="form-container">
    <div class="progress-container">
        <div class="progress-bar">
            <div class="progress-line"></div>
            <div class="progress-line-fill" id="line-fill"></div>
            <div class="step-circle active">1</div>
            <div class="step-circle">2</div>
            <div class="step-circle">3</div>
        </div>
        <small id="step-text">Bước 1: Thông tin cá nhân</small>
    </div>

    <form id="multiStepForm">
        <div class="step active" id="step-1">
            <div class="form-group">
                <label>Họ và tên</label>
                <input type="text" id="fullname" placeholder="Nhập ít nhất 3 ký tự">
                <div class="error" id="err-fullname">Họ tên không hợp lệ</div>
            </div>
            <div class="form-group">
                <label>Ngày sinh</label>
                <input type="date" id="dob">
                <div class="error" id="err-dob">Vui lòng chọn ngày sinh</div>
            </div>
            <div class="form-group">
                <label>Giới tính</label>
                <select id="gender" style="width:100%; padding:10px;">
                    <option value="">-- Chọn --</option>
                    <option value="Nam">Nam</option>
                    <option value="Nữ">Nữ</option>
                </select>
                <div class="error" id="err-gender">Vui lòng chọn giới tính</div>
            </div>
        </div>

        <div class="step" id="step-2">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="example@gmail.com">
                <div class="error" id="err-email">Email không đúng định dạng</div>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="password">
                <div class="error" id="err-password">Mật khẩu cần ít nhất 8 ký tự</div>
            </div>
            <div class="form-group">
                <label>Xác nhận mật khẩu</label>
                <input type="password" id="confirmPassword">
                <div class="error" id="err-confirm">Mật khẩu không khớp</div>
            </div>
        </div>

        <div class="step" id="step-3">
            <h3>Xác nhận thông tin</h3>
            <div class="summary-box" id="summary">
                </div>
        </div>

        <div class="btn-group">
            <button type="button" class="btn-prev" id="prevBtn" style="display: none;">Quay lại</button>
            <button type="button" class="btn-next" id="nextBtn">Tiếp theo</button>
        </div>
    </form>
</div>

<script src="scriptbtvn2.js"></script>
</body>
</html>
