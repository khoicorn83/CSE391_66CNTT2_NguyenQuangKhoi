<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Form Đặt Hàng Trực Tuyến</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f9; }
        .container { max-width: 500px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        .error { color: red; font-size: 13px; margin-top: 5px; display: none; }
        .char-count { font-size: 12px; text-align: right; color: #666; }
        .total-price { font-size: 18px; color: #e67e22; font-weight: bold; margin: 10px 0; }
        
        /* Modal xác nhận */
        #confirmBox { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; border: 2px solid #333; padding: 20px; z-index: 100; box-shadow: 0 0 100px rgba(0,0,0,0.5);
        }
        .btn-group { margin-top: 15px; display: flex; gap: 10px; }
        button { cursor: pointer; padding: 10px 15px; }
        .btn-submit { background: #27ae60; color: white; border: none; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛒 Đặt Hàng Trực Tuyến</h2>
    <form id="orderForm">
        <div class="form-group">
            <label>Sản phẩm:</label>
            <select id="product">
                <option value="">-- Chọn sản phẩm --</option>
                <option value="ao">Áo thun (150.000đ)</option>
                <option value="quan">Quần Jean (350.000đ)</option>
                <option value="giay">Giày thể thao (500.000đ)</option>
            </select>
            <div class="error" id="err-product">Vui lòng chọn sản phẩm</div>
        </div>

        <div class="form-group">
            <label>Số lượng (1-99):</label>
            <input type="number" id="quantity" value="1">
            <div class="error" id="err-quantity">Số lượng phải từ 1 đến 99</div>
        </div>

        <div class="total-price">Tổng tiền: <span id="display-total">0</span>đ</div>

        <div class="form-group">
            <label>Ngày giao hàng:</label>
            <input type="date" id="deliveryDate">
            <div class="error" id="err-date">Ngày giao không hợp lệ (Trong vòng 30 ngày tới)</div>
        </div>

        <div class="form-group">
            <label>Địa chỉ giao hàng:</label>
            <input type="text" id="address" placeholder="Nhập ít nhất 10 ký tự">
            <div class="error" id="err-address">Địa chỉ phải ít nhất 10 ký tự</div>
        </div>

        <div class="form-group">
            <label>Ghi chú:</label>
            <textarea id="note" rows="3" placeholder="Thông tin thêm..."></textarea>
            <div class="char-count" id="note-count">0/200</div>
            <div class="error" id="err-note">Ghi chú không được quá 200 ký tự</div>
        </div>

        <div class="form-group">
            <label>Phương thức thanh toán:</label>
            <input type="radio" name="payment" value="COD" style="width: auto;"> COD
            <input type="radio" name="payment" value="Banking" style="width: auto;"> Chuyển khoản
            <input type="radio" name="payment" value="E-wallet" style="width: auto;"> Ví điện tử
            <div class="error" id="err-payment">Vui lòng chọn phương thức thanh toán</div>
        </div>

        <button type="submit" class="btn-submit">Đặt Hàng Ngay</button>
    </form>
</div>

<div id="confirmBox">
    <h3>📝 Xác nhận đơn hàng?</h3>
    <div id="summary"></div>
    <div class="btn-group">
        <button onclick="finalSubmit()" style="background: #27ae60; color: white;">Xác nhận</button>
        <button onclick="closeModal()">Hủy</button>
    </div>
</div>

<script src="script2_2.js"></script>
</body>
</html>
