<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Ký Thành Viên</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .form-container { background: white; padding: 30px; border-radius: 8px; width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; }
        .form-group { margin-bottom: 15px; position: relative; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        input[type="text"], input[type="email"], input[type="password"], input[type="tel"] {
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
        }
        input.invalid { border-color: #ff4d4d; background-color: #fff5f5; }
        .error-message { color: #ff4d4d; font-size: 12px; margin-top: 4px; display: none; }
        .gender-group, .terms-group { margin-top: 10px; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background: #1557b0; }
        #success-msg { display: none; text-align: center; padding: 20px; background: #e6fffa; border: 1px solid #38a169; border-radius: 8px; }
    
        /* 1. CSS cho Đếm ký tự */
    .char-count { font-size: 11px; position: absolute; right: 0; top: 0; color: #888; }
    
    /* 2. CSS cho Ẩn/Hiện mật khẩu */
    .password-wrapper { position: relative; }
    .toggle-password {
        position: absolute; right: 10px; top: 10px; cursor: pointer; font-size: 18px; color: #666;
    }

    /* 3. CSS cho Thanh độ mạnh mật khẩu */
    .strength-meter { height: 5px; width: 100%; background: #eee; margin-top: 5px; border-radius: 2px; overflow: hidden; }
    .strength-bar { height: 100%; width: 0%; transition: width 0.3s, background 0.3s; }
    .strength-text { font-size: 11px; margin-top: 2px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="form-container" id="formWrapper">
        <h2>Đăng Ký</h2>
        <form id="registrationForm" novalidate>
            <div class="form-group">
    <label>Họ và tên <span id="name-count" class="char-count">0/50</span></label>
    <input type="text" id="fullname" maxlength="50" placeholder="Nhập ít nhất 3 ký tự">
    <span class="error-message" id="fullname-error"></span>
</div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="example@domain.com">
                <span class="error-message" id="email-error"></span>
            </div>

            <div class="form-group">
                <label>Số điện thoại</label>
                <input type="tel" id="phone" placeholder="Bắt đầu bằng số 0, đủ 10 số">
                <span class="error-message" id="phone-error"></span>
            </div>

            <div class="form-group">
    <label>Mật khẩu</label>
    <div class="password-wrapper">
        <input type="password" id="password" placeholder="Tối thiểu 8 ký tự, có hoa, thường và số">
        <span class="toggle-password" id="togglePassword">👁️</span>
    </div>
    <div class="strength-meter"><div id="strengthBar" class="strength-bar"></div></div>
    <div id="strengthText" class="strength-text"></div>
    <span class="error-message" id="password-error"></span>
</div>

            <div class="form-group">
                <label>Xác nhận mật khẩu</label>
                <input type="password" id="confirmPassword">
                <span class="error-message" id="confirmPassword-error"></span>
            </div>

            <div class="form-group gender-group">
                <label>Giới tính:</label>
                <input type="radio" name="gender" value="Nam" id="male"> Nam
                <input type="radio" name="gender" value="Nữ" id="female"> Nữ
                <span class="error-message" id="gender-error"></span>
            </div>

            <div class="form-group terms-group">
                <input type="checkbox" id="terms"> Tôi đồng ý với điều khoản
                <span class="error-message" id="terms-error"></span>
            </div>

            <button type="submit">Đăng ký ngay</button>
        </form>
    </div>

    <div id="success-msg"></div>

    <script src="script2.js"></script>
</body>
</html>
